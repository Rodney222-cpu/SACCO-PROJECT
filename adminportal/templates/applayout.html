{% extends 'base_html.html' %}

{% block body %}
<body>
        
    <div class="easyui-layout" data-options="fit:true" style="width:700px;height:350px;">
        <div data-options="region:'north'" class="applyout-header-panel">
            
            <img class="applayout-header-logo"
                src="{{ url_for('static', filename='images/yo_logo.png') }}" />
            
            <span class="applayout-header-appname">
                {{ _(messages.app_name) }}
            </span>

            <div class="applayout-header-user-panel" align="right">
                <strong>User:</strong> <span class="applayout-header-user-name">{{ session['user']['name'] }}</span><br/>
                <span>
                    <a href="#" 
                        class="easyui-linkbutton linkbutton-custom-style" 
                        data-options="plain:true,iconCls:'icon-exit',onClick:function(){applayoutLogOut();}" >{{ _(messages.log_out) }}</a>
                </span>
            </div>
        </div>
        <div data-options="region:'center'" class="applyout-center-panel">
            <div class="easyui-tabs applyout-center-panel-tabs" data-options="fit:true,tabPosition:'left'">
                <div title="{{ _('SACCOs') }}" data-options="iconCls:'icon-man',closable:false"></div>
                <div title="{{ _('Transactions') }}" data-options="iconCls:'icon-transactions',closable:false"></div>
                <div title="{{ _('Audit Trail') }}" data-options="iconCls:'icon-list',closable:false"></div>
                <div title="{{ _('Users') }}" data-options="iconCls:'icon-people',closable:false"></div>
                <div title="{{ _('ACGs') }}" data-options="iconCls:'icon-control-center',closable:false,href:'{{ url_for("acg.acgs") }}'"></div>
            </div>
        </div>
        <div data-options="region:'south'" align="center" class="applyout-footer-panel">
            <span class="applayout-footer-copyright">{{ _('%(copyright)s', copyright=messages['copyright']) }}</span>
        </div>
    </div>
    <!-- End of page layout -->

</body>
    <script>
    {%  include 'js/applayout.js' %}
    {%  include 'acgs/acgs.js' %}
    </script>
{% endblock %}


{% block footer %}
  
{% endblock %}
